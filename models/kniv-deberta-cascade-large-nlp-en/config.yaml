# Training configuration for kniv-deberta-cascade-large-nlp-en (TEACHER model)
# Cascaded multi-task: POS → NER → DEP/CLS with MLP heads + LayerNorm
#
# This is the teacher model for knowledge distillation.
# After training, run generate_soft_labels.py to produce soft targets,
# then train the small student via models/kniv-deberta-cascade-nlp-en/distill.py.

model:
  encoder: "microsoft/deberta-v3-large"
  max_length: 128
  dropout: 0.1

data:
  ud_train: "data/ud-english-ewt/en_ewt-ud-train.conllu"
  ud_dev: "data/ud-english-ewt/en_ewt-ud-dev.conllu"
  ud_test: "data/ud-english-ewt/en_ewt-ud-test.conllu"
  ner_source: "corpus"  # NER from kniv validated corpus

training:
  epochs: 5
  batch_size: 64            # A100 40GB VRAM
  learning_rate: 1.0e-5     # halved — 2e-5 caused NaN at epoch 2 with multi-task gradients
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  ner_loss_weight: 1.0
  pos_loss_weight: 1.0
  dep_loss_weight: 1.0
  srl_loss_weight: 1.0
  cls_loss_weight: 0.5
  batches_per_task: 1

dep2label:
  encoding: "rel-pos"

classification:
  labels:
    - inform
    - correction
    - agreement
    - question
    - plan_commit
    - request
    - feedback
    - social
    - filler

output:
  dir: "outputs/kniv-deberta-cascade-large-nlp-en"
  save_every_epoch: true

publish:
  hf_org: "dragonscale-ai"
  hf_name: "kniv-deberta-cascade-large-nlp-en"
