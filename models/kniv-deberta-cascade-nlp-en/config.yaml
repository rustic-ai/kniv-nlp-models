# Training configuration for kniv-deberta-cascade-nlp-en (STUDENT model)
# Cascaded multi-task: POS → NER → DEP/CLS with MLP heads + LayerNorm

model:
  encoder: "microsoft/deberta-v3-small"
  max_length: 128
  dropout: 0.1

data:
  ud_train: "data/ud-english-ewt/en_ewt-ud-train.conllu"
  ud_dev: "data/ud-english-ewt/en_ewt-ud-dev.conllu"
  ud_test: "data/ud-english-ewt/en_ewt-ud-test.conllu"
  ner_source: "corpus"  # NER from kniv validated corpus (spaCy + GPT validated)

training:
  epochs: 10
  batch_size: 64          # A100 80GB — no gradient checkpointing needed
  learning_rate: 6.0e-5  # scaled 2x from 3e-5 for 4x batch size (sqrt scaling)
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  # Multi-task loss weights
  ner_loss_weight: 1.0
  pos_loss_weight: 1.0
  dep_loss_weight: 1.0
  cls_loss_weight: 0.5  # lower weight — less training data than NER/POS/dep
  # Task alternation: how many batches of each task per cycle
  batches_per_task: 1

dep2label:
  # Encoding scheme for dependency parsing as token classification
  # Format: {signed_offset}@{relation}@{head_UPOS}
  # Example: +1@nsubj@VERB means "my head is the 1st VERB to the right, relation nsubj"
  encoding: "rel-pos"

classification:
  # Sentence-level dialog act classification (uniko cognitive memory types)
  # Each label maps to a specific action in uniko's knowledge pipeline.
  # Labels generated by GPT-5.4-nano via corpus/pipeline/classify.py,
  # with rule-based bootstrap as fallback.
  labels:
    - inform       # extract observation (primary knowledge source)
    - correction   # flag existing knowledge for update
    - agreement    # reinforce existing observation
    - question     # record knowledge gap
    - plan_commit  # link to Goal/Task (promise, offer, suggest)
    - request      # create action node (command, instruction)
    - feedback     # skip extraction (acknowledgment, backchannel)
    - social       # skip extraction (greeting, goodbye, thanks, apology)
    - filler       # skip entirely (turn/time management, stalling)

output:
  dir: "outputs/kniv-deberta-cascade-nlp-en"
  save_every_epoch: true

publish:
  hf_org: "dragonscale-ai"
  hf_name: "kniv-deberta-cascade-nlp-en"
