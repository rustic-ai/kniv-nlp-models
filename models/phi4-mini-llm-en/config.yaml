# LLM domain adaptation for business/finance/ERP text
# Continued pretraining via LoRA on business corpus
#
# Supported base models (change model.base to switch):
#   - microsoft/Phi-4-mini-reasoning   (3.8B, MIT, best reasoning under 4B)
#   - Qwen/Qwen3-4B                   (4B, Apache 2.0, thinking mode toggle)
#   - google/gemma-4-E4B               (4B effective MoE, Apache 2.0, multimodal)
#   - deepseek-ai/DeepSeek-R1-Distill-Qwen-7B  (7B, MIT, strongest reasoner)

model:
  base: "microsoft/Phi-4-mini-reasoning"
  max_length: 4096

lora:
  r: 16                    # rank — higher = more capacity, more memory
  lora_alpha: 32           # scaling factor (alpha/r = effective LR multiplier)
  lora_dropout: 0.05
  target_modules:          # which layers get LoRA adapters
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"

training:
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8   # effective batch = 4 * 8 = 32
  learning_rate: 2.0e-4            # LoRA typically uses higher LR than full fine-tune
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  lr_scheduler: "cosine"
  bf16: true                       # use bfloat16 if GPU supports it
  logging_steps: 50
  save_steps: 500
  eval_steps: 500

data:
  # Raw corpus paths (full documents, not sentence-split)
  sources:
    - "corpus/output/raw/business/sec_edgar/filings.jsonl"
    - "corpus/output/raw/business/enron/emails.jsonl"
    - "corpus/output/raw/business/openstax/books.jsonl"
    - "corpus/output/raw/business/odoo/docs.jsonl"
    - "corpus/output/raw/business/wikipedia/articles.jsonl"
    - "corpus/output/raw/business/cuad/contracts.jsonl"
    - "corpus/output/raw/business/s2orc/abstracts.jsonl"
  text_field: "text"               # JSON field containing the text
  dev_ratio: 0.05                  # 5% held out for eval
  seed: 42

output:
  dir: "outputs/phi4-mini-llm-en"
  save_total_limit: 3              # keep only last 3 checkpoints

publish:
  hf_org: "dragonscale-ai"
  hf_name: "kniv-phi4-mini-llm-en"
